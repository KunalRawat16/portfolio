        <label for="your-email" style="margin-top: 1rem">Your email</label
              >

                id="your-email"
                name="your-email"
                type="email"
                autocomplete="email"
                placeholder="email@gmail.com"
                required
              />

              <label for="your-message" style="margin-top: 1rem"
                >Your message</label
              >
              <textarea
                id="your-message"
                name="your-message"
                placeholder="Your message"
                rows="4"
                required
              ></textarea>
